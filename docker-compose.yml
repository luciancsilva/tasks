    services:
      tududi:
        container_name: tududi
        build:
          context: https://github.com/luciancsilva/tasks.git#main
          dockerfile: Dockerfile
        restart: unless-stopped

        ports:
          - "${TUDUDI_PORT}:3002"

        environment:
          TUDUDI_USER_EMAIL: ${TUDUDI_USER_EMAIL}
          TUDUDI_USER_PASSWORD: ${TUDUDI_USER_PASSWORD}
          TUDUDI_SESSION_SECRET: ${TUDUDI_SESSION_SECRET}
          TUDUDI_ALLOWED_ORIGINS: ${TUDUDI_ALLOWED_ORIGINS}
          TUDUDI_TRUST_PROXY: ${TUDUDI_TRUST_PROXY}
          TZ: ${TZ}
          
          # Cloudflare — conta compartilhada entre R2 e D1
          CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
          CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}

          # Cloudflare R2 (storage de anexos/avatares/capas/branding)
          CLOUDFLARE_R2_ACCESS_KEY_ID: ${CLOUDFLARE_R2_ACCESS_KEY_ID:-}
          CLOUDFLARE_R2_SECRET_ACCESS_KEY: ${CLOUDFLARE_R2_SECRET_ACCESS_KEY:-}
          CLOUDFLARE_R2_BUCKET: ${CLOUDFLARE_R2_BUCKET:-}
          CLOUDFLARE_R2_ENDPOINT: ${CLOUDFLARE_R2_ENDPOINT:-}

          # Cloudflare D1 (TUDUDI_DB_DRIVER=d1 ativa o banco remoto via REST API)
          TUDUDI_DB_DRIVER: ${TUDUDI_DB_DRIVER:-}
          CLOUDFLARE_D1_DATABASE_ID: ${CLOUDFLARE_D1_DATABASE_ID:-}

        volumes:
          - tududi_db:/app/backend/db
          - tududi_uploads:/app/backend/uploads

    volumes:
      tududi_db:
      tududi_uploads: