    services:
      tududi:
        container_name: tududi
        build:
          context: https://github.com/luciancsilva/tasks.git#main
          dockerfile: Dockerfile
        restart: unless-stopped

        ports:
          - "${TUDUDI_PORT}:3002"

        environment:
          TUDUDI_USER_EMAIL: ${TUDUDI_USER_EMAIL}
          TUDUDI_USER_PASSWORD: ${TUDUDI_USER_PASSWORD}
          TUDUDI_SESSION_SECRET: ${TUDUDI_SESSION_SECRET}
          TUDUDI_ALLOWED_ORIGINS: ${TUDUDI_ALLOWED_ORIGINS}
          TUDUDI_TRUST_PROXY: ${TUDUDI_TRUST_PROXY}
          TZ: ${TZ}
          
          # Variáveis R2
          R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
          R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
          R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
          R2_BUCKET: ${R2_BUCKET}
          R2_ENDPOINT: ${R2_ENDPOINT}

          # Variáveis Cloudflare D1 (TUDUDI_DB_DRIVER=d1 ativa o banco remoto via REST API)
          TUDUDI_DB_DRIVER: ${TUDUDI_DB_DRIVER:-}
          CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID:-}
          CLOUDFLARE_D1_DATABASE_ID: ${CLOUDFLARE_D1_DATABASE_ID:-}
          CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:-}

        volumes:
          - tududi_db:/app/backend/db
          - tududi_uploads:/app/backend/uploads

    volumes:
      tududi_db:
      tududi_uploads: